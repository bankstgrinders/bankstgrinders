<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JTKV5TFNVQ"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-JTKV5TFNVQ');</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Share Your Experience | Bank St. Grinders</title>
  <meta name="description" content="Share your Bank St. Grinders experience! Leave a review and show off your grinder." />
  <link rel="icon" type="image/png" href="500_white_logo.png" />
  <link rel="apple-touch-icon" href="500_white_logo.png" />
  <meta property="og:title" content="Share Your Experience | Bank St. Grinders" />
  <meta property="og:description" content="We'd love to hear about your visit! Leave us a review." />
  <meta property="og:image" content="https://bankstgrinders.com/500_white_logo.png" />
  <meta property="og:url" content="https://bankstgrinders.com/submit-review.html" />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <img src="500_white_logo.png" alt="Bank St. Grinders Logo" class="logo" />
      <h1 class="site-title">Bank St. Grinders</h1>
      <p class="site-slogan">Come experience heaven on a hoagie!</p>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="catering.html">Catering</a>
        <a href="apply.html">Apply</a>
      </nav>
    </div>
  </header>

  <!-- DIVIDER -->
  <div class="divider">
    <span>&#9670; &#9670; &#9670;</span>
    <div class="divider-social">
      <span class="divider-social-label">Follow the grind!</span>
      <a href="https://www.facebook.com/BankStGrinders/" target="_blank" rel="noopener" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
      <a href="https://www.tiktok.com/@bankstgrinders" target="_blank" rel="noopener" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
    </div>
  </div>

  <!-- COMBINED FORM -->
  <main class="apply-main">
    <h2 class="apply-heading"><i class="fa-solid fa-star"></i> Share Your Experience</h2>
    <p class="apply-subheading">We'd love to hear about your visit! Leave us a review and feel free to show off your grinder too.</p>

    <form class="apply-form" action="https://formsubmit.co/john@bankstgrinders.com" method="POST" enctype="multipart/form-data">
      <input type="hidden" name="_next" value="https://bankstgrinders.com/thankyou-review.html" />
      <input type="hidden" name="_subject" value="New Experience Submission!" />
      <input type="hidden" name="_captcha" value="false" />

      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Smith" required />
      </div>

      <div class="form-group">
        <label for="sandwich">What did you order? <span class="label-optional">(optional)</span></label>
        <input type="text" id="sandwich" name="grinder" placeholder="e.g. Beef Dip, Italian Grinder..." />
      </div>

      <div class="form-group">
        <span id="rating-label">Your Rating</span>
        <div class="star-rating" role="radiogroup" aria-labelledby="rating-label">
          <input type="radio" id="star5" name="rating" value="5 stars" aria-label="5 stars" required />
          <label for="star5" title="5 stars"><i class="fa-solid fa-star"></i></label>
          <input type="radio" id="star4" name="rating" value="4 stars" aria-label="4 stars" />
          <label for="star4" title="4 stars"><i class="fa-solid fa-star"></i></label>
          <input type="radio" id="star3" name="rating" value="3 stars" aria-label="3 stars" />
          <label for="star3" title="3 stars"><i class="fa-solid fa-star"></i></label>
          <input type="radio" id="star2" name="rating" value="2 stars" aria-label="2 stars" />
          <label for="star2" title="2 stars"><i class="fa-solid fa-star"></i></label>
          <input type="radio" id="star1" name="rating" value="1 star" aria-label="1 star" />
          <label for="star1" title="1 star"><i class="fa-solid fa-star"></i></label>
        </div>
      </div>

      <div class="form-group">
        <label for="review">Your Review</label>
        <textarea id="review" name="review" rows="5" placeholder="Tell us about your visit..." required></textarea>
      </div>

      <div class="form-group">
        <label for="photo">Got a photo? <span class="label-optional">(optional)</span></label>
        <input type="file" id="photo" name="photo" accept="image/*" class="file-input" />
      </div>

      <div class="form-submit">
        <button type="submit" class="btn btn-primary">Submit</button>
      </div>
    </form>

    <div class="back-link">
      <a href="index.html" class="btn btn-secondary">&larr; Back to Home</a>
    </div>
  </main>

  <!-- DIVIDER -->
  <div class="divider">
    <span>&#9670; &#9670; &#9670;</span>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>Family owned and operated since 2012.</p>
    <div class="social-links">
      <a href="https://www.facebook.com/BankStGrinders/" target="_blank" rel="noopener" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
      <a href="https://www.tiktok.com/@bankstgrinders" target="_blank" rel="noopener" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
    </div>
  </footer>

</body>
</html>
