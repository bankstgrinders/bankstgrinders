<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Share Your Grinder | Bank St. Grinders</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <img src="500_white_logo.png" alt="Bank St. Grinders Logo" class="logo" />
      <h1 class="site-title">Bank St. Grinders</h1>
      <p class="site-slogan">Come experience heaven on a hoagie!</p>
    </div>
  </header>

  <!-- DIVIDER -->
  <div class="divider">
    <span>&#9670; &#9670; &#9670;</span>
    <div class="divider-social">
      <span class="divider-social-label">Follow the grind!</span>
      <a href="https://www.facebook.com/BankStGrinders/" target="_blank" rel="noopener" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
      <a href="https://www.tiktok.com/@bankstgrinders" target="_blank" rel="noopener" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
    </div>
  </div>

  <!-- PHOTO SUBMISSION FORM -->
  <main class="apply-main">
    <h2 class="apply-heading"><i class="fa-solid fa-camera"></i> Show Us Your Grinder!</h2>
    <p class="apply-subheading">Proud of what you ordered? Send us a pic — we'd love to see it!</p>

    <form class="apply-form" action="https://formsubmit.co/john@bankstgrinders.com" method="POST" enctype="multipart/form-data">
      <input type="hidden" name="_next" value="https://bankstgrinders.com/thankyou-photo.html" />
      <input type="hidden" name="_subject" value="New Grinder Photo Submission!" />
      <input type="hidden" name="_captcha" value="false" />

      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Smith" required />
      </div>

      <div class="form-group">
        <label for="sandwich">What did you order?</label>
        <input type="text" id="sandwich" name="grinder" placeholder="e.g. Beef Dip, Italian Grinder..." />
      </div>

      <div class="form-group">
        <label for="photo">Your Photo</label>
        <input type="file" id="photo" name="photo" accept="image/*" required class="file-input" />
      </div>

      <div class="form-submit">
        <button type="submit" class="btn btn-primary">Send It!</button>
      </div>

    </form>

    <div class="back-link">
      <a href="index.html" class="btn btn-secondary">&larr; Back to Home</a>
    </div>
  </main>

  <!-- DIVIDER -->
  <div class="divider">
    <span>&#9670; &#9670; &#9670;</span>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>Family owned and operated since 2012.</p>
    <div class="social-links">
      <a href="https://www.facebook.com/BankStGrinders/" target="_blank" rel="noopener" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
      <a href="https://www.tiktok.com/@bankstgrinders" target="_blank" rel="noopener" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
    </div>
  </footer>

</body>
</html>
