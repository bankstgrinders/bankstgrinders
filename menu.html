<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu | Bank St. Grinders</title>
  <meta name="description" content="View the full menu at Bank St. Grinders — subs, grinders, cheesesteaks, and more. Kingman's best deli since 2012." />
  <link rel="icon" type="image/png" href="500_white_logo.png" />
  <link rel="apple-touch-icon" href="500_white_logo.png" />
  <meta property="og:title" content="Menu | Bank St. Grinders" />
  <meta property="og:description" content="View the full menu at Bank St. Grinders — subs, grinders, cheesesteaks, and more." />
  <meta property="og:image" content="https://bankstgrinders.com/500_white_logo.png" />
  <meta property="og:url" content="https://bankstgrinders.com/menu.html" />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <img src="500_white_logo.png" alt="Bank St. Grinders Logo" class="logo" />
      <h1 class="site-title">Bank St. Grinders</h1>
      <p class="site-slogan">Come experience heaven on a hoagie!</p>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="menu.html" class="active">Menu</a>
        <a href="catering.html">Catering</a>
        <a href="apply.html">Apply</a>
      </nav>
    </div>
  </header>

  <!-- DIVIDER -->
  <div class="divider">
    <span>&#9670; &#9670; &#9670;</span>
    <div class="divider-social">
      <span class="divider-social-label">Follow the grind!</span>
      <a href="https://www.facebook.com/BankStGrinders/" target="_blank" rel="noopener" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
      <a href="https://www.tiktok.com/@bankstgrinders" target="_blank" rel="noopener" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
    </div>
  </div>

  <!-- MENU SECTION -->
  <main class="menu-main">
    <h2 class="menu-heading">Our Menu</h2>

    <!-- PDF VIEWER - desktop only -->
    <div class="pdf-container">
      <embed
        src="menu/menu.pdf#navpanes=0"
        type="application/pdf"
        width="100%"
        height="100%"
      />
    </div>
    <p class="pdf-fallback">
      Can't see the menu?
      <a href="menu/menu.pdf" target="_blank">Click here to open it</a>
    </p>

    <!-- MOBILE BUTTON - shown on mobile instead of the embed -->
    <div class="mobile-menu">
      <p class="mobile-menu-text">Tap below to view our full menu</p>
      <a href="menu/menu.pdf" target="_blank" class="btn btn-primary">Open Menu</a>
    </div>

    <!-- BACK BUTTON -->
    <div class="back-link">
      <a href="index.html" class="btn btn-secondary">&larr; Back to Home</a>
    </div>
  </main>

  <!-- DIVIDER -->
  <div class="divider">
    <span>&#9670; &#9670; &#9670;</span>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>Family owned and operated since 2012.</p>
    <div class="social-links">
      <a href="https://www.facebook.com/BankStGrinders/" target="_blank" rel="noopener" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
      <a href="https://www.tiktok.com/@bankstgrinders" target="_blank" rel="noopener" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
    </div>
  </footer>

</body>
</html>
