<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../tv.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
<div class="slide-page" style="background: #000; color: var(--cream); grid-template-rows: 0 1fr 0;">

  <div class="slide-body" style="grid-row: 2; display: grid; grid-template-rows: auto 1fr auto; padding: 80px 100px; gap: 30px; text-align: center;">

    <div id="kicker" style="font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--gold); letter-spacing: 0.16em; text-transform: uppercase; line-height: 1;"></div>

    <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px;">
      <picture>
        <source srcset="../../500_white_logo.webp" type="image/webp" />
        <img src="../../500_white_logo.png" alt="Bank St. Grinders" style="width: 240px; height: 240px; border-radius: 50%; object-fit: cover;" />
      </picture>
      <div id="brandName" style="font-family: 'Playfair Display', serif; font-size: 8rem; font-weight: 900; color: var(--cream); letter-spacing: 0.02em; line-height: 0.95;"></div>
      <div id="slogan" style="font-family: 'Lora', serif; font-style: italic; font-size: 2.4rem; color: var(--gold); max-width: 1500px; line-height: 1.2;"></div>
      <div id="story" style="font-family: 'Lora', serif; font-size: 2rem; color: var(--cream); max-width: 1400px; line-height: 1.4; margin-top: 20px;">Family-owned and proudly serving <span id="cityName"></span> since <span id="estYear"></span>. <strong style="color: var(--gold);">Come hungry.</strong></div>
    </div>

    <div id="addressLine" style="font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--cream); letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.85;"></div>

  </div>

</div>

<script>
(async () => {
  const res = await fetch('../data/menu.json?t=' + Date.now(), { cache: 'no-store' });
  const m = await res.json();
  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  document.getElementById('kicker').textContent = `Hello there!`;
  document.getElementById('brandName').textContent = m.info.name;
  document.getElementById('slogan').textContent = m.info.slogan;

  // Pull city out of "Kingman, AZ 86409" — only trust the first segment
  // when the string actually has a comma, else fall back to a sensible default.
  const addrParts = String(m.info.addressLine2 || '').split(',');
  const city = (addrParts.length > 1 && addrParts[0].trim()) ? addrParts[0].trim() : 'Kingman';
  document.getElementById('cityName').textContent = city;
  document.getElementById('estYear').textContent = m.info.established || '2012';

  document.getElementById('addressLine').textContent = `${m.info.addressLine1} · ${m.info.phone}`;
})();
</script>

</body>
</html>
