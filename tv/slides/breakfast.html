<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../tv.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
<div class="slide-page">

  <header class="slide-head" id="head">Breakfast</header>

  <div class="slide-body" id="body" style="padding: 40px 120px;"></div>

  <footer class="slide-foot" id="foot"></footer>

</div>

<script>
(async () => {
  const res = await fetch('../data/menu.json?t=' + Date.now(), { cache: 'no-store' });
  const m = await res.json();
  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  document.getElementById('head').textContent = m.breakfast.title;
  document.getElementById('foot').textContent = `${m.info.name} · ${m.info.addressLine1} · ${m.info.phone}`;

  const body = document.getElementById('body');

  m.breakfast.items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'slide-row';
    row.innerHTML =
      `<span class="slide-row-name">${esc(item.name)}</span>` +
      `<span class="slide-row-desc">${esc(item.desc)}</span>` +
      `<span class="slide-row-price">${esc(item.price)}</span>`;
    body.appendChild(row);
  });

  const meal = document.createElement('div');
  meal.style.cssText = 'margin-top: 60px; padding: 30px 40px; background: var(--parchment); border-radius: 10px; border: 3px solid var(--gold);';
  meal.innerHTML =
    `<h3 style="font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 900; color: var(--red-deli); text-align: center; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 20px;">${esc(m.makeItAMeal.title)} &mdash; $${esc(m.makeItAMeal.basePrice)}</h3>` +
    `<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px 40px; font-family: 'Lora', serif; font-size: 1.5rem; color: var(--brown-dark); text-align: center;">` +
    m.makeItAMeal.items.map(i => `<div>${esc(i.name)} · <b>${esc(i.price)}</b></div>`).join('') +
    `<div style="font-style: italic; color: var(--text-muted);">${esc(m.makeItAMeal.note)}</div>` +
    `</div>`;
  body.appendChild(meal);
})();
</script>

</body>
</html>
