<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../tv.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
<div class="slide-page" style="background: var(--cream); grid-template-rows: 0 1fr 0;">

  <div class="slide-body" style="grid-row: 2; display: grid; grid-template-columns: 1.1fr 0.9fr; align-items: center; padding: 60px 90px; gap: 80px; text-align: left;">

    <!-- Left: copy -->
    <div style="display: flex; flex-direction: column; justify-content: center; gap: 24px;">

      <div id="kicker" style="font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--brown-mid); letter-spacing: 0.16em; text-transform: uppercase; line-height: 1;"></div>

      <div id="headline" style="font-family: 'Playfair Display', serif; font-size: 6rem; font-weight: 900; color: var(--red-deli); line-height: 0.95; letter-spacing: 0.02em;"></div>

      <div id="subtitle" style="font-family: 'Lora', serif; font-style: italic; font-size: 2.2rem; color: var(--brown-dark); line-height: 1.3; max-width: 700px;"></div>

      <div style="display: flex; align-items: center; gap: 12px; margin-top: 8px;">
        <span style="display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: var(--gold);"></span>
        <span style="font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--brown-mid); letter-spacing: 0.12em; text-transform: uppercase;">Scan with your phone camera</span>
      </div>

    </div>

    <!-- Right: QR card -->
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; padding: 30px; background: #fff; border: 6px solid var(--gold); border-radius: 18px; box-shadow: 0 10px 30px rgba(0,0,0,0.18);">
      <img id="qrImage" alt="QR code" style="width: 460px; height: 460px; display: block; image-rendering: crisp-edges;" />
      <div id="qrSiteLabel" style="font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--brown-mid); letter-spacing: 0.14em; text-transform: uppercase;"></div>
    </div>

  </div>

</div>

<script>
(async () => {
  const res = await fetch('../data/menu.json?t=' + Date.now(), { cache: 'no-store' });
  const m = await res.json();

  const qr = (m.promos && m.promos.qr) || {};

  document.getElementById('kicker').textContent = qr.kicker || `Hey ${(m.info && m.info.name) || 'friend'}! 👋`;
  document.getElementById('headline').textContent = qr.headline || 'How are we doing?';
  document.getElementById('subtitle').textContent = qr.subtitle || 'Tap the camera. Point at the code. Tell the world.';

  // Generate the QR via api.qrserver.com — simple, no JS lib needed. The
  // image is cached aggressively by Chromium after first load, so this
  // doesn't depend on internet at every slide cycle.
  const url = (qr.url || '').trim();
  const img = document.getElementById('qrImage');
  if (url) {
    const enc = encodeURIComponent(url);
    img.src = `https://api.qrserver.com/v1/create-qr-code/?size=460x460&margin=8&qzone=1&data=${enc}`;
    // Show a clean URL caption below the QR (host only, no protocol)
    let host = '';
    try { host = new URL(url).hostname.replace(/^www\./, ''); } catch (_) { host = url; }
    document.getElementById('qrSiteLabel').textContent = host;
  } else {
    // No URL configured yet — show a polite placeholder instead of a broken image
    img.style.display = 'none';
    const placeholder = document.createElement('div');
    placeholder.style.cssText = 'width: 460px; height: 460px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px; font-family: "Lora", serif; font-style: italic; font-size: 1.4rem; color: var(--text-muted); background: var(--parchment); border-radius: 10px;';
    placeholder.textContent = 'Set the review URL in Admin → Promos to display the QR code here.';
    img.parentNode.insertBefore(placeholder, img);
    document.getElementById('qrSiteLabel').textContent = '';
  }
})();
</script>

</body>
</html>
