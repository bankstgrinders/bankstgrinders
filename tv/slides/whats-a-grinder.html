<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../tv.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
<div class="slide-page" style="background: var(--cream); grid-template-rows: 0 1fr 0;">

  <div class="slide-body" style="grid-row: 2; display: grid; grid-template-rows: auto auto 1fr auto; padding: 70px 120px; gap: 30px; text-align: center;">

    <div style="font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700; color: var(--brown-mid); letter-spacing: 0.18em; text-transform: uppercase; line-height: 1;">WAIT &mdash; What's a Grinder?</div>

    <!-- Strikethroughs of common regional names, then "grinder" stamped on top -->
    <div style="display: flex; flex-direction: column; align-items: center; gap: 14px; font-family: 'Playfair Display', serif; font-weight: 700; line-height: 1; padding-top: 10px;">
      <div style="font-size: 4.4rem; color: var(--text-muted); text-decoration: line-through; text-decoration-thickness: 6px; text-decoration-color: var(--red-deli); letter-spacing: 0.04em; text-transform: uppercase;">Sub</div>
      <div style="font-size: 4.4rem; color: var(--text-muted); text-decoration: line-through; text-decoration-thickness: 6px; text-decoration-color: var(--red-deli); letter-spacing: 0.04em; text-transform: uppercase;">Hoagie</div>
      <div style="font-size: 4.4rem; color: var(--text-muted); text-decoration: line-through; text-decoration-thickness: 6px; text-decoration-color: var(--red-deli); letter-spacing: 0.04em; text-transform: uppercase;">Poor Boy</div>
    </div>

    <!-- The reveal -->
    <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 22px;">
      <div style="font-family: 'Lora', serif; font-style: italic; font-size: 2.2rem; color: var(--brown-mid);">round here, it's a&hellip;</div>
      <div style="font-family: 'Playfair Display', serif; font-size: 9rem; font-weight: 900; color: var(--red-deli); letter-spacing: 0.04em; line-height: 1; text-transform: uppercase;">Grinder</div>
      <div style="font-family: 'Lora', serif; font-size: 1.9rem; color: var(--brown-dark); max-width: 1400px; line-height: 1.4;">Fresh-baked roll. Premium meats. <strong style="color: var(--red-deli);">Hot or cold &mdash; your call.</strong> Toasted on request.</div>
    </div>

    <div style="font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--brown-mid); letter-spacing: 0.14em; text-transform: uppercase;">Try yours <em style="color: var(--red-deli); font-weight: 900;">"with the works"</em></div>

  </div>

</div>
</body>
</html>
