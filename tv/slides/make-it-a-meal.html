<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../tv.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
<div class="slide-page">

  <header class="slide-head" id="head">Make It A Meal</header>

  <div class="slide-body" style="padding: 50px 100px; justify-content: space-around;">

    <div id="priceBlock" style="text-align: center;">
      <div id="basePrice" style="font-family: 'Playfair Display', serif; font-size: 9rem; font-weight: 900; color: var(--red-deli); line-height: 0.95;"></div>
      <div id="subhead" style="font-family: 'Lora', serif; font-style: italic; font-size: 2rem; color: var(--text-muted); margin-top: 12px;">Add to any sandwich</div>
    </div>

    <div id="items" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 28px 100px; padding: 40px 80px; background: var(--parchment); border: 5px solid var(--gold); border-radius: 16px; font-family: 'Playfair Display', serif; font-size: 2.7rem; font-weight: 700; color: var(--brown-dark); text-align: left;"></div>

    <div id="note" style="text-align: center; font-family: 'Lora', serif; font-style: italic; font-size: 1.6rem; color: var(--text-muted);"></div>

  </div>

  <footer class="slide-foot" id="foot"></footer>

</div>

<script>
(async () => {
  const res = await fetch('../data/menu.json?t=' + Date.now(), { cache: 'no-store' });
  const m = await res.json();
  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  document.getElementById('head').textContent = m.makeItAMeal.title;
  document.getElementById('foot').textContent = `${m.info.name} · ${m.info.addressLine1} · ${m.info.phone}`;
  document.getElementById('basePrice').textContent = '$' + m.makeItAMeal.basePrice;

  document.getElementById('items').innerHTML = m.makeItAMeal.items.map(i =>
    `<div><span style="color: var(--brown-dark);">${esc(i.name)}</span> &middot; <b style="color: var(--red-deli);">${esc(i.price)}</b></div>`
  ).join('');

  if (m.makeItAMeal.note) {
    document.getElementById('note').textContent = m.makeItAMeal.note;
  } else {
    document.getElementById('note').style.display = 'none';
  }
})();
</script>

</body>
</html>
